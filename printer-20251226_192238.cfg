# Mainsail Setting #

[include shell_command.cfg]
[include mainsail.cfg]
[include macros.cfg]
[include KAMP_Settings.cfg]
#[include mmu/base/*.cfg] # Board: Fly ERCF EasyBird V1.1 #
#[include mmu/optional/client_macros.cfg] 
#[include timelapse.cfg]

[force_move]
enable_force_move: true

[respond]
 
[exclude_object] # Enable object exclusion

##### Vz235 #####

[gcode_arcs]
resolution: 0.1

[printer]
kinematics: corexy
max_velocity: 800
max_accel: 10000
#max_accel_to_decel: 5000
max_z_velocity: 20
max_z_accel: 1500
square_corner_velocity: 10

########################

[mcu] # Board: BTT SKR Mini e3 V2 #
serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_39FFD90530314B3618700643-if00
restart_method: command

#[mcu rpi]
#serial: /tmp/klipper_host_mcu

#[adxl345]
#cs_pin: rpi:None


#[resonance_tester]
#accel_chip: adxl345
#probe_points:
 #  117.5,117.5,20  # an example
#accel_per_hz: 150
########################
########################

[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 64
rotation_distance: 40
endstop_pin: ^PC0
position_endstop: 0
position_max: 220
homing_speed: 50

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 1.2 #1.3 changed by HDG
sense_resistor: 0.110
stealthchop_threshold: 0

[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 64
rotation_distance: 40
endstop_pin: ^PC1
position_endstop: 0
position_max: 220
homing_speed: 50

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 1.2 #1.3 changed by HDG
sense_resistor: 0.110
stealthchop_threshold: 0

[stepper_z]
step_pin: PB0
dir_pin: PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 4
#endstop_pin: ^PC2
endstop_pin: probe:z_virtual_endstop
#position_endstop: 0.0
position_max: 190
position_min: -20
homing_speed: 5
second_homing_speed: 3  #set this to 3 if homing with collision
homing_retract_speed: 2
homing_retract_dist:5

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.80
sense_resistor: 0.110
stealthchop_threshold: 0

#########################

[extruder]
step_pin: PB3
dir_pin: !PB4
enable_pin: !PD2
microsteps: 16
rotation_distance: 35.8
gear_ratio: 60:10
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PA0
min_temp: 0
max_temp: 300
max_extrude_only_distance: 1000.0
max_extrude_cross_section: 500
max_extrude_only_velocity: 200
max_extrude_only_accel: 10000
min_extrude_temp: 0
pressure_advance: 0.04
pressure_advance_smooth_time: 0.03

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.75
stealthchop_threshold: 0

[heater_bed]
heater_pin: PC9
sensor_type: Generic 3950 #EPCOS 100K B57560G104F
sensor_pin: PC3
min_temp: 0
max_temp: 110

#####################################################################
#   Fan Control
#####################################################################

[heater_fan nozzle_cooling_fan]
pin: PC7
max_power: 1
fan_speed: 1
kick_start_time: 0.5
hardware_pwm: false
heater: extruder
heater_temp: 60.0
shutdown_speed: 0


[fan]
pin: PA8
max_power: 0.9
cycle_time: 0.002
hardware_pwm: false
shutdown_speed: 0

[static_digital_output usb_pullup_enable]
pins: !PA14

#####################################################################
#   Thermals
#####################################################################

[temperature_sensor raspberry_pi] # Rpi temp
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[temperature_sensor mcu_temp] # BTT SKR Mini E3 V2.0 temp
sensor_type: temperature_mcu
max_temp: 100

[temperature_sensor chamber] # Chamber temp Add by HDG
sensor_type: Generic 3950
sensor_pin: PC2
pullup_resistor: 10000
min_temp: 0
max_temp: 100
gcode_id: C


########################

#[firmware_retraction]
#retract_length: 0.6
#retract_speed: 50
#unretract_extra_length: 0
#unretract_speed: 50

#[filament_switch_sensor RunoutSensor]
#pause_on_runout: false
#runout_gcode: PAUSE
#insert_gcode: RESUME
#switch_pin: PC15

#####################################################################
#   Z Probe
#####################################################################

[BDsensor] 
sda_pin: PC14 
scl_pin: PA1 
delay: 20 # 20us per pulse, this value should be >=20 but must be below 50
#z_offset:0 # this `z_offset` must be set to 0. 
#z_adjust:0.0 # z axis adjustment, replace the z_offset function. within -0.3 to 0.3mm
x_offset: 0
y_offset: 25.4
no_stop_probe: # enable this for fast probe, the toolhead will not stop at the probe point.
position_endstop: 0.8 # the Z axis will stop at this position (mm) while homing z, recommend value is 0.4~1.0
collision_homing:0 #  set it 1 to enable homing with nozzle collision sensing.
collision_calibrate:0 # set it 1 to enable auto calibrate BDsensor with nozzle collision sensing.
#QGL_Tilt_Probe:0 #set 1 to enable probe up and down when do quad_gantry_level

[bed_mesh]
algorithm: bicubic
horizontal_move_z: 1
speed: 150
mesh_min: 26, 50
mesh_max: 215,215
probe_count: 15,15
zero_reference_position: 117.5, 92.1

[safe_z_home]
home_xy_position: 117.5, 92.1 # Change coordinates to the center of your print bed
z_hop: 1 # Move up 3mm
z_hop_speed: 2
speed: 120

[bed_screws]
screw1: 20,20
screw2: 20,215
screw3: 215,215
screw4: 215,20

#####################################################################
#   KlipperScreen
#####################################################################

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PB5,  EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8,  EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PB15, EXP1_10=<5V>

[virtual_sdcard]
path: ~hdgreef/printer_data/gcodes
on_error_gcode: CANCEL_PRINT
[display_status]
[pause_resume]

[input_shaper]
shaper_freq_x: 93.8
shaper_type_x: mzv
shaper_freq_y: 59.6
shaper_type_y: mzv

[axis_twist_compensation]
#speed: 50
#   The speed (in mm/s) of non-probing moves during the calibration.
#   The default is 50.
#horizontal_move_z: 5
#   The height (in mm) that the head should be commanded to move to
#   just prior to starting a probe operation. The default is 5.
calibrate_start_x: 20
#   Defines the minimum X coordinate of the calibration
#   This should be the X coordinate that positions the nozzle at the starting
#   calibration position. This parameter must be provided.
calibrate_end_x: 200
#   Defines the maximum X coordinate of the calibration
#   This should be the X coordinate that positions the nozzle at the ending
#   calibration position. This parameter must be provided.
calibrate_y: 112.5
#   Defines the Y coordinate of the calibration
#   This should be the Y coordinate that positions the nozzle during the
#   calibration process. This parameter must be provided and is recommended to
#   be near the center of the bed

